<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mesosfer</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="stylesheet" href="/interface/style.css">
    <!-- highlight.js — syntax highlighting for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

    <!-- ── Header ── -->
    <div class="header">
        <div class="header-left">
            <button class="new-conversation-btn" onclick="newConversation()" title="New Conversation (Ctrl+Shift+N)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </button>
            <h1>Mesosfer</h1>
        </div>
    </div>

    <!-- ── Chat area ── -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-wrapper" id="chatWrapper">
            <!-- Messages are injected here by chat.js -->
        </div>
    </div>

    <!-- ── Empty state (shown when no conversation) ── -->
    <div class="empty-state" id="emptyState">
        <h2 class="empty-state-title">Welcome to Mesosfer</h2>
        <div class="empty-input-wrapper">
            <textarea
                id="emptyInput"
                class="empty-input"
                placeholder="Ask anything"
                rows="1"
                onkeydown="handleEmptyKeyDown(event)"
            ></textarea>
            <button id="emptySendButton" class="empty-send-button" onclick="sendFromEmpty()" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- ── Feedback modal ── -->
    <div class="modal-overlay" id="feedbackOverlay" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
        <div class="modal">
            <p class="modal-title" id="feedbackTitle">Provide Feedback</p>
            <p class="modal-subtitle">Help us improve Mesosfer by sharing your thoughts on this response.</p>

            <div class="modal-field">
                <label class="modal-label" for="feedbackReason">Reason</label>
                <select class="modal-select" id="feedbackReason">
                    <option value="" disabled selected>Select a reason...</option>
                    <option value="inappropriate_response">Inappropriate response</option>
                    <option value="continuous_repetition">Continuous repetition of words</option>
                    <option value="factually_incorrect">Factually incorrect</option>
                    <option value="too_verbose">Too verbose/unhelpful</option>
                    <option value="formatting_issues">Formatting issues</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="modal-field">
                <label class="modal-label" for="feedbackComment">
                    Comment <span style="color:#9ca3af;font-weight:400">(optional)</span>
                </label>
                <textarea
                    class="modal-textarea"
                    id="feedbackComment"
                    placeholder="Tell us more about the issue..."
                    rows="3"
                ></textarea>
            </div>

            <div class="modal-toast" id="feedbackToast">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
                Feedback submitted. Thank you!
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="feedbackCancel">Cancel</button>
                <button class="btn-submit" id="feedbackSubmit">Submit</button>
            </div>
        </div>
    </div>

    <!-- ── Input bar (shown during active conversation) ── -->
    <div class="input-container" id="inputContainer">
        <div class="input-wrapper">
            <textarea
                id="chatInput"
                class="chat-input"
                placeholder="Ask anything"
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button id="sendButton" class="send-button" onclick="sendMessage()" disabled>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- highlight.js core (no auto-init — we call hljs.highlight() manually) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- feedback.js must load before chat.js -->
    <script src="/interface/feedback.js"></script>
    <script src="/interface/markdown.js"></script>
    <script src="/interface/chat.js"></script>

</body>
</html>
