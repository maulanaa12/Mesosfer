<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mesosfer</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="interface/style.css">
    <!-- highlight.js — syntax highlighting for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

    <!-- ── Header ── -->
    <header class="header" role="banner">
        <div class="header-left">
            <button
                class="new-conversation-btn"
                onclick="newConversation()"
                title="New Conversation (Ctrl+Shift+N)"
                aria-label="Start new conversation"
            >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                </svg>
            </button>
            <div class="header-wordmark">
                <img src="logo.svg" alt="" class="header-logo" width="24" height="24" aria-hidden="true">
                <h1>Mesosfer</h1>
            </div>
        </div>
    </header>

    <!-- ── Chat area ── -->
    <main class="chat-container" id="chatContainer" role="main" aria-label="Conversation">
        <div class="chat-wrapper" id="chatWrapper" aria-live="polite" aria-atomic="false">
            <!-- Messages are injected here by chat.js -->
        </div>
    </main>

    <!-- ── Empty state (shown when no conversation) ── -->
    <div class="empty-state" id="emptyState" role="region" aria-label="Start a conversation">
        <h2 class="empty-state-title">What can I help with?</h2>
        <div class="empty-input-wrapper">
            <textarea
                id="emptyInput"
                class="empty-input"
                placeholder="Ask anything"
                rows="1"
                onkeydown="handleEmptyKeyDown(event)"
                aria-label="Message input"
                aria-multiline="true"
            ></textarea>
            <button
                id="emptySendButton"
                class="empty-send-button"
                onclick="sendFromEmpty()"
                disabled
                aria-label="Send message"
            >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- ── Feedback modal ── -->
    <div class="modal-overlay" id="feedbackOverlay" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
        <div class="modal">
            <p class="modal-title" id="feedbackTitle">Share feedback</p>
            <p class="modal-subtitle">Help improve Mesosfer by sharing your thoughts on this response.</p>

            <div class="modal-field">
                <label class="modal-label" for="feedbackReason">Reason</label>
                <select class="modal-select" id="feedbackReason" aria-required="false">
                    <option value="" disabled selected>Select a reason...</option>
                    <option value="inappropriate_response">Inappropriate response</option>
                    <option value="continuous_repetition">Continuous repetition</option>
                    <option value="factually_incorrect">Factually incorrect</option>
                    <option value="too_verbose">Too verbose or unhelpful</option>
                    <option value="formatting_issues">Formatting issues</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="modal-field">
                <label class="modal-label" for="feedbackComment">
                    Comment <span style="color:var(--color-muted-soft);font-weight:400">(optional)</span>
                </label>
                <textarea
                    class="modal-textarea"
                    id="feedbackComment"
                    placeholder="Tell us more about the issue..."
                    rows="3"
                    aria-label="Additional feedback comment"
                ></textarea>
            </div>

            <div class="modal-toast" id="feedbackToast" role="status" aria-live="polite">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
                Feedback submitted. Thank you!
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="feedbackCancel">Cancel</button>
                <button class="btn-submit" id="feedbackSubmit">Submit</button>
            </div>
        </div>
    </div>

    <!-- ── Input bar (shown during active conversation) ── -->
    <div class="input-container" id="inputContainer" role="region" aria-label="Message input">
        <div class="input-wrapper">
            <div class="input-row">
                <textarea
                    id="chatInput"
                    class="chat-input"
                    placeholder="Ask anything"
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    aria-label="Message input"
                    aria-multiline="true"
                ></textarea>
                <button
                    id="sendButton"
                    class="send-button"
                    onclick="sendMessage()"
                    disabled
                    aria-label="Send message"
                >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M22 2L11 13"></path>
                        <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                    </svg>
                </button>
                <button
                    id="stopButton"
                    class="stop-button"
                    onclick="stopGeneration()"
                    style="display:none"
                    aria-label="Stop generation"
                >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                </button>
            </div>
            <div class="input-meta">
                <span class="input-hints" aria-hidden="true">Enter to send · Shift+Enter for newline · ↑ for last message</span>
                <span id="charCounter" class="char-counter" aria-live="polite" aria-atomic="true"></span>
            </div>
        </div>
    </div>

    <!-- highlight.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- feedback.js must load before chat.js -->
    <script src="interface/feedback.js"></script>
    <script src="interface/markdown.js"></script>
    <script src="interface/chat.js"></script>

</body>
</html>
